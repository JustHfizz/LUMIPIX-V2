<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Glass Photo Editor</title>

<style>

@import url('https://fonts.cdnfonts.com/css/sf-pro-display');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;

    font-family:
    'SF Pro Display',
    sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top left,#7f5af0 0%,transparent 30%),
    radial-gradient(circle at bottom right,#2cb67d 0%,transparent 30%),
    linear-gradient(135deg,#09111f,#0f172a,#050816);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:24px;

    overflow:hidden;
}

/* CONTAINER */

.container{

    width:1500px;
    max-width:100%;

    height:900px;

    display:flex;

    gap:24px;

    padding:24px;

    border-radius:42px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    backdrop-filter:blur(40px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.4),
    inset 0 1px 1px rgba(255,255,255,0.08);
}

/* SIDEBAR */

.sidebar{

    width:390px;

    overflow-y:auto;

    padding:24px;

    border-radius:34px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(30px);
}

.sidebar h1{

    color:white;

    font-size:34px;

    margin-bottom:6px;
}

.subtitle{

    color:rgba(255,255,255,0.6);

    margin-bottom:30px;
}

.group{

    margin-bottom:32px;
}

.group h2{

    color:white;

    margin-bottom:16px;

    font-size:15px;
}

/* BUTTON */

.glass-btn{

    position:relative;

    border:none;

    color:white;

    cursor:pointer;

    overflow:hidden;

    transition:0.25s ease;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.22),
        rgba(255,255,255,0.04)
    );

    border:
    1px solid rgba(255,255,255,0.18);

    backdrop-filter:blur(20px);

    box-shadow:

    inset
    0 1px 1px rgba(255,255,255,0.2),

    inset
    0 -8px 18px rgba(0,0,0,0.15),

    0 10px 20px rgba(0,0,0,0.25);
}

.glass-btn::before{

    content:"";

    position:absolute;

    top:2px;
    left:2px;
    right:2px;

    height:45%;

    border-radius:999px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.32),
        rgba(255,255,255,0.02)
    );
}

.glass-btn:hover{

    transform:
    translateY(-2px)
    scale(1.02);
}

.glass-btn.active{

    background:
    linear-gradient(
        180deg,
        rgba(16,185,129,0.4),
        rgba(16,185,129,0.1)
    );

    border:
    1px solid rgba(16,185,129,0.5);

    box-shadow:

    0 0 18px rgba(16,185,129,0.45),

    0 0 36px rgba(16,185,129,0.22),

    inset
    0 1px 1px rgba(255,255,255,0.18);
}

/* SLIDER */

.slider-box{

    margin-bottom:20px;
}

.slider-box label{

    display:flex;

    justify-content:space-between;

    color:white;

    margin-bottom:10px;
}

input[type="range"]{

    width:100%;

    appearance:none;

    height:8px;

    border-radius:999px;

    background:rgba(255,255,255,0.12);
}

input[type="range"]::-webkit-slider-thumb{

    appearance:none;

    width:18px;
    height:18px;

    border-radius:50%;

    background:white;

    cursor:pointer;

    box-shadow:0 0 12px rgba(255,255,255,0.45);
}

/* FILTER */

.filter-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

.filter-card{

    padding:12px;

    border-radius:24px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);
}

.filter-btn{

    width:100%;

    height:46px;

    border-radius:18px;

    font-size:13px;

    font-weight:600;
}

.filter-slider{

    display:none;

    margin-top:14px;

    animation:fadeIn .25s ease;
}

.filter-slider.active{

    display:block;
}

.filter-slider label{

    display:flex;

    justify-content:space-between;

    color:white;

    margin-bottom:10px;

    font-size:13px;
}

/* TOOLS */

.tools{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

.tool-btn{

    height:58px;

    border-radius:20px;

    font-size:14px;

    font-weight:600;
}

/* EDITOR */

.editor{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:20px;
}

.topbar{

    height:82px;

    border-radius:32px;

    padding:0 24px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.03)
    );

    border:1px solid rgba(255,255,255,0.08);
}

.topbar h2{

    color:white;
}

.upload-btn{

    height:56px;

    min-width:200px;

    border-radius:999px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:600;
}

.canvas-container{

    flex:1;

    position:relative;

    overflow:hidden;

    border-radius:36px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.02)
    );

    border:1px solid rgba(255,255,255,0.08);
}

canvas{

    max-width:100%;
    max-height:100%;

    border-radius:20px;
}

/* CROP */

.crop-box{

    position:absolute;

    border:2px solid #10b981;

    background:rgba(16,185,129,0.15);

    display:none;

    pointer-events:none;

    box-shadow:
    0 0 20px rgba(16,185,129,0.45);
}

/* NOTIFICATION */

.crop-warning{

    position:absolute;

    top:22px;

    left:50%;

    transform:translateX(-50%);

    display:none;

    align-items:center;

    gap:12px;

    padding:14px 18px;

    border-radius:22px;

    background:
    linear-gradient(
        145deg,
        rgba(16,185,129,0.22),
        rgba(16,185,129,0.08)
    );

    border:
    1px solid rgba(16,185,129,0.3);

    backdrop-filter:blur(20px);

    color:white;

    z-index:99;
}

.crop-warning-icon{

    width:34px;
    height:34px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.16),
        rgba(255,255,255,0.04)
    );
}

/* ANIMATION */

@keyframes fadeIn{

    from{

        opacity:0;
        transform:translateY(-4px);
    }

    to{

        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h1>Photo Editor</h1>

        <div class="subtitle">
            Liquid Glass Interface
        </div>

        <!-- ADJUSTMENTS -->

        <div class="group">

            <h2>Adjustments</h2>

            <div class="slider-box">

                <label>
                    Brightness
                    <span id="brightnessValue">0%</span>
                </label>

                <input type="range"
                id="brightness"
                min="-100"
                max="100"
                value="0">

            </div>

            <div class="slider-box">

                <label>
                    Contrast
                    <span id="contrastValue">0%</span>
                </label>

                <input type="range"
                id="contrast"
                min="-100"
                max="100"
                value="0">

            </div>

            <div class="slider-box">

                <label>
                    Saturation
                    <span id="saturationValue">0%</span>
                </label>

                <input type="range"
                id="saturation"
                min="-100"
                max="100"
                value="0">

            </div>

        </div>

        <!-- FILTER -->

        <div class="group">

            <h2>Filters</h2>

            <div class="filter-grid">

                <script>

                const filterNames = [

                    "B&W",
                    "Warm",
                    "Cool",
                    "Vintage",
                    "Fade",
                    "Dreamy",
                    "Cinema",
                    "Soft",
                    "Moody",
                    "Sharp"
                ];

                </script>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'bw')">
                        B&W
                    </button>

                    <div class="filter-slider"
                    id="bwSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="bwValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('bw',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'warm')">
                        Warm
                    </button>

                    <div class="filter-slider"
                    id="warmSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="warmValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('warm',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'cool')">
                        Cool
                    </button>

                    <div class="filter-slider"
                    id="coolSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="coolValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('cool',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'vintage')">
                        Vintage
                    </button>

                    <div class="filter-slider"
                    id="vintageSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="vintageValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('vintage',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'fade')">
                        Fade
                    </button>

                    <div class="filter-slider"
                    id="fadeSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="fadeValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('fade',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'dreamy')">
                        Dreamy
                    </button>

                    <div class="filter-slider"
                    id="dreamySlider">

                        <label>
                            <span>Intensity</span>
                            <span id="dreamyValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('dreamy',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'cinematic')">
                        Cinema
                    </button>

                    <div class="filter-slider"
                    id="cinematicSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="cinematicValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('cinematic',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'soft')">
                        Soft
                    </button>

                    <div class="filter-slider"
                    id="softSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="softValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('soft',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'moody')">
                        Moody
                    </button>

                    <div class="filter-slider"
                    id="moodySlider">

                        <label>
                            <span>Intensity</span>
                            <span id="moodyValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('moody',this.value)">
                    </div>
                </div>

                <div class="filter-card">
                    <button class="glass-btn filter-btn"
                    onclick="toggleFilter(this,'sharp')">
                        Sharp
                    </button>

                    <div class="filter-slider"
                    id="sharpSlider">

                        <label>
                            <span>Intensity</span>
                            <span id="sharpValue">0%</span>
                        </label>

                        <input type="range"
                        min="0"
                        max="100"
                        value="0"
                        disabled
                        oninput="updateFilter('sharp',this.value)">
                    </div>
                </div>

            </div>

        </div>

        <!-- TOOLS -->

        <div class="group">

            <h2>Tools</h2>

            <div class="tools">

                <button class="glass-btn tool-btn"
                id="cropBtn"
                onclick="activateCrop(this)">

                    Crop

                </button>

                <button class="glass-btn tool-btn"
                onclick="activateTool(this); rotateImage();">

                    Rotate

                </button>

                <button class="glass-btn tool-btn"
                onclick="activateTool(this); resetImage();">

                    Reset

                </button>

                <button class="glass-btn tool-btn"
                onclick="activateTool(this); downloadImage();">

                    Download

                </button>

            </div>

        </div>

    </div>

    <!-- EDITOR -->

    <div class="editor">

        <div class="topbar">

            <h2>Liquid Glass Editor</h2>

            <label class="glass-btn upload-btn">

                Upload Photo

                <input
                type="file"
                id="upload"
                accept="image/*"
                hidden>

            </label>

        </div>

        <div class="canvas-container"
        id="canvasContainer">

            <div class="crop-warning"
            id="cropWarning">

                <div class="crop-warning-icon">

                    <svg width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none">

                        <path
                        d="M7 3V17C7 18.1046 7.89543 19 9 19H21"
                        stroke="white"
                        stroke-width="2.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>

                        <path
                        d="M17 7H3"
                        stroke="white"
                        stroke-width="2.2"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>

                    </svg>

                </div>

                <span>
                    Crop mode aktif
                </span>

            </div>

            <canvas id="canvas"></canvas>

            <div class="crop-box"
            id="cropBox"></div>

        </div>

    </div>

</div>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const upload =
document.getElementById("upload");

const cropBox =
document.getElementById("cropBox");

const cropWarning =
document.getElementById("cropWarning");

const canvasContainer =
document.getElementById("canvasContainer");

let img = new Image();

let originalImage = "";

let cropMode = false;

let isCropping = false;

let startX,startY,endX,endY;

let drawData = {};

let adjustments = {

    brightness:0,
    contrast:0,
    saturation:0
};

let filters = {

    bw:0,
    warm:0,
    cool:0,
    vintage:0,
    fade:0,
    dreamy:0,
    cinematic:0,
    soft:0,
    moody:0,
    sharp:0
};

let state = {

    grayscale:0,
    sepia:0,
    rotation:0
};

/* ACTIVE TOOL */

function activateTool(button){

    if(button.classList.contains("active")){

        button.classList.remove("active");

        return;
    }

    document
    .querySelectorAll(".tool-btn")
    .forEach(btn=>{

        btn.classList.remove("active");
    });

    button.classList.add("active");
}

/* UPLOAD */

upload.addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        img.onload = ()=>{

            resizeCanvas();

            drawImage();
        };

        img.src = event.target.result;

        originalImage =
        event.target.result;
    };

    reader.readAsDataURL(file);
});

/* RESIZE */

function resizeCanvas(){

    canvas.width =
    canvasContainer.clientWidth - 40;

    canvas.height =
    canvasContainer.clientHeight - 40;
}

/* DRAW */

function drawImage(){

    if(!img.src) return;

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const imageAspect =
    img.width / img.height;

    const canvasAspect =
    canvas.width / canvas.height;

    let renderWidth;
    let renderHeight;

    if(imageAspect > canvasAspect){

        renderWidth = canvas.width;

        renderHeight =
        canvas.width / imageAspect;
    }
    else{

        renderHeight = canvas.height;

        renderWidth =
        canvas.height * imageAspect;
    }

    ctx.save();

    ctx.translate(
        canvas.width / 2,
        canvas.height / 2
    );

    ctx.rotate(
        state.rotation * Math.PI / 180
    );

    drawData = {

        x:-renderWidth/2,
        y:-renderHeight/2,
        width:renderWidth,
        height:renderHeight
    };

    applyFilters();

    const brightness =
    100 + adjustments.brightness;

    const contrast =
    100 + adjustments.contrast;

    const saturation =
    100 + adjustments.saturation;

    ctx.filter = `
        brightness(${brightness}%)
        contrast(${contrast}%)
        saturate(${saturation}%)
        grayscale(${state.grayscale}%)
        sepia(${state.sepia}%)
    `;

    ctx.drawImage(
        img,
        -renderWidth/2,
        -renderHeight/2,
        renderWidth,
        renderHeight
    );

    ctx.restore();
}

/* ADJUSTMENTS */

function bindSlider(id,key){

    const slider =
    document.getElementById(id);

    const value =
    document.getElementById(id + "Value");

    slider.addEventListener("input",()=>{

        adjustments[key] =
        parseInt(slider.value);

        value.innerText =
        slider.value + "%";

        drawImage();
    });
}

bindSlider("brightness","brightness");
bindSlider("contrast","contrast");
bindSlider("saturation","saturation");

/* FILTER */

function toggleFilter(button,name){

    const sliderBox =
    document.getElementById(name + "Slider");

    const slider =
    sliderBox.querySelector("input");

    if(button.classList.contains("active")){

        button.classList.remove("active");

        sliderBox.classList.remove("active");

        slider.disabled = true;

        filters[name] = 0;

        slider.value = 0;

        document.getElementById(
            name + "Value"
        ).innerText = "0%";

        drawImage();

        return;
    }

    button.classList.add("active");

    sliderBox.classList.add("active");

    slider.disabled = false;
}

function updateFilter(name,value){

    filters[name] = parseInt(value);

    document.getElementById(
        name + "Value"
    ).innerText = value + "%";

    drawImage();
}

function applyFilters(){

    state.grayscale = 0;
    state.sepia = 0;

    adjustments.brightness =
    parseInt(
        document.getElementById("brightness").value
    );

    adjustments.contrast =
    parseInt(
        document.getElementById("contrast").value
    );

    adjustments.saturation =
    parseInt(
        document.getElementById("saturation").value
    );

    state.grayscale += filters.bw;

    state.sepia += filters.warm * 0.5;

    adjustments.saturation +=
    filters.cool * -0.4;

    state.sepia +=
    filters.vintage * 0.7;

    adjustments.contrast +=
    filters.fade * -0.4;

    adjustments.brightness +=
    filters.dreamy * 0.25;

    adjustments.contrast +=
    filters.cinematic * 0.5;

    adjustments.saturation +=
    filters.soft * -0.2;

    adjustments.brightness +=
    filters.moody * -0.4;

    adjustments.contrast +=
    filters.sharp * 0.8;
}

/* ROTATE */

function rotateImage(){

    state.rotation += 90;

    if(state.rotation >= 360){

        state.rotation = 0;
    }

    drawImage();
}

/* RESET */

function resetImage(){

    if(!originalImage) return;

    img.src = originalImage;

    state.rotation = 0;

    document
    .querySelectorAll("input[type='range']")
    .forEach(slider=>{

        slider.value = 0;
    });

    document
    .querySelectorAll(".glass-btn")
    .forEach(btn=>{

        btn.classList.remove("active");
    });

    document
    .querySelectorAll(".filter-slider")
    .forEach(slider=>{

        slider.classList.remove("active");

        slider.querySelector("input")
        .disabled = true;
    });

    document
    .querySelectorAll("[id$='Value']")
    .forEach(el=>{

        el.innerText = "0%";
    });

    filters = {

        bw:0,
        warm:0,
        cool:0,
        vintage:0,
        fade:0,
        dreamy:0,
        cinematic:0,
        soft:0,
        moody:0,
        sharp:0
    };

    adjustments = {

        brightness:0,
        contrast:0,
        saturation:0
    };

    drawImage();
}

/* DOWNLOAD */

function downloadImage(){

    const link =
    document.createElement("a");

    link.download =
    "edited-image.png";

    link.href =
    canvas.toDataURL("image/png");

    link.click();
}

/* CROP */

function activateCrop(button){

    if(button.classList.contains("active")){

        button.classList.remove("active");

        cropMode = false;

        cropWarning.style.display = "none";

        return;
    }

    activateTool(button);

    cropMode = true;

    cropWarning.style.display = "flex";

    setTimeout(()=>{

        cropWarning.style.display = "none";

    },3000);
}

canvas.addEventListener("mousedown",(e)=>{

    if(!cropMode) return;

    const rect =
    canvas.getBoundingClientRect();

    startX = e.clientX - rect.left;
    startY = e.clientY - rect.top;

    isCropping = true;

    cropBox.style.display = "block";
});

canvas.addEventListener("mousemove",(e)=>{

    if(!isCropping) return;

    const rect =
    canvas.getBoundingClientRect();

    endX = e.clientX - rect.left;
    endY = e.clientY - rect.top;

    cropBox.style.left =
    Math.min(startX,endX) + "px";

    cropBox.style.top =
    Math.min(startY,endY) + "px";

    cropBox.style.width =
    Math.abs(endX - startX) + "px";

    cropBox.style.height =
    Math.abs(endY - startY) + "px";
});

canvas.addEventListener("mouseup",()=>{

    if(!isCropping) return;

    isCropping = false;

    const cropX =
    Math.min(startX,endX);

    const cropY =
    Math.min(startY,endY);

    const cropWidth =
    Math.abs(endX - startX);

    const cropHeight =
    Math.abs(endY - startY);

    if(cropWidth < 10 || cropHeight < 10){

        cropBox.style.display = "none";

        return;
    }

    const scaleX =
    img.width / drawData.width;

    const scaleY =
    img.height / drawData.height;

    const realX =
    (cropX - (canvas.width/2 + drawData.x))
    * scaleX;

    const realY =
    (cropY - (canvas.height/2 + drawData.y))
    * scaleY;

    const realWidth =
    cropWidth * scaleX;

    const realHeight =
    cropHeight * scaleY;

    const tempCanvas =
    document.createElement("canvas");

    const tempCtx =
    tempCanvas.getContext("2d");

    tempCanvas.width =
    realWidth;

    tempCanvas.height =
    realHeight;

    tempCtx.drawImage(
        img,
        realX,
        realY,
        realWidth,
        realHeight,
        0,
        0,
        realWidth,
        realHeight
    );

    img.src =
    tempCanvas.toDataURL();

    cropMode = false;

    cropBox.style.display = "none";

    document
    .querySelectorAll(".tool-btn")
    .forEach(btn=>{

        btn.classList.remove("active");
    });

    drawImage();
});

window.addEventListener("resize",()=>{

    resizeCanvas();

    drawImage();
});

</script>

</body>
</html>
