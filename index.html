<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foto Editor V2 PCD </title>

<style>

@import url('https://fonts.cdnfonts.com/css/sf-pro-display');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'SF Pro Display',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    background:#04070f;
    overflow:hidden;
}

body{

    background:
    radial-gradient(circle at top left,#7c5cff 0%,transparent 30%),
    radial-gradient(circle at bottom right,#19c37d 0%,transparent 30%),
    linear-gradient(135deg,#09111f,#0f172a,#04070f);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

/* ===================================================== */
/* CONTAINER                                              */
/* ===================================================== */

.container{

    width:100%;
    height:calc(100vh - 40px);

    display:flex;

    gap:24px;

    padding:24px;

    border-radius:46px;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:
    blur(30px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 30px 60px rgba(0,0,0,0.35);

    overflow:hidden;
}

/* ===================================================== */
/* SIDEBAR                                                */
/* ===================================================== */

.sidebar{

    width:430px;

    padding:30px;

    border-radius:40px;

    overflow-y:auto;
    overflow-x:hidden;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    scrollbar-width:thin;

    scrollbar-color:
    rgba(255,255,255,0.25)
    transparent;
}

.sidebar::-webkit-scrollbar{
    width:8px;
}

.sidebar::-webkit-scrollbar-track{
    background:transparent;
}

.sidebar::-webkit-scrollbar-thumb{

    border-radius:999px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.08)
    );
}

.sidebar::-webkit-scrollbar-button{
    display:none;
}

.sidebar h1{

    color:white;

    font-size:52px;

    font-weight:700;

    margin-bottom:8px;
}

.subtitle{

    color:
    rgba(255,255,255,0.6);

    margin-bottom:40px;
}

.group{

    margin-bottom:38px;
}

.group h2{

    color:white;

    font-size:18px;

    margin-bottom:18px;
}

/* ===================================================== */
/* SLIDER                                                 */
/* ===================================================== */

.slider-box{

    margin-bottom:24px;
}

.slider-box label{

    display:flex;

    justify-content:space-between;

    color:white;

    margin-bottom:10px;

    font-size:15px;
}

input[type="range"]{

    width:100%;

    appearance:none;

    height:8px;

    border-radius:999px;

    background:
    rgba(255,255,255,0.12);

    outline:none;

    cursor:pointer;
}

input[type="range"]::-webkit-slider-thumb{

    appearance:none;

    width:24px;
    height:24px;

    border-radius:50%;

    background:white;

    cursor:pointer;

    box-shadow:
    0 0 16px rgba(255,255,255,0.7);

    transition:
    transform .2s ease,
    box-shadow .2s ease;
}

input[type="range"]::-webkit-slider-thumb:hover{

    transform:scale(1.1);

    box-shadow:
    0 0 22px rgba(255,255,255,0.9);
}

/* ===================================================== */
/* FILTERS                                                */
/* ===================================================== */

.filter-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:16px;

    align-items:start;
}

.filter-card{

    padding:12px;

    border-radius:24px;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    transition:
    transform .25s ease,
    box-shadow .25s ease;

    cursor:pointer;

    overflow:visible;

    position:relative;

    z-index:1;
}

.filter-card:hover{

    transform:
    translateY(-4px);

    box-shadow:
    0 12px 24px rgba(0,0,0,0.25);

    z-index:5;
}

.filter-card.active{

    border:
    1px solid rgba(255,255,255,0.22);

    box-shadow:
    0 0 18px rgba(255,255,255,0.08);

    z-index:20;
}

.filter-preview{

    width:100%;

    aspect-ratio:1/1;

    border-radius:18px;

    overflow:hidden;

    margin-bottom:10px;

    background:
    rgba(255,255,255,0.05);

    border:
    1px solid rgba(255,255,255,0.1);
}

.filter-preview canvas{

    width:100%;
    height:100%;

    display:block;

    object-fit:cover;
}

.filter-name{

    color:white;

    text-align:center;

    font-size:14px;

    font-weight:600;
}

.filter-slider{

    display:none;

    margin-top:14px;

    position:relative;

    z-index:9999;

    overflow:visible;
}

.filter-slider.active{

    display:block;

    animation:
    fadeSlider .22s ease;
}

@keyframes fadeSlider{

    from{

        opacity:0;

        transform:
        translateY(-6px);
    }

    to{

        opacity:1;

        transform:
        translateY(0);
    }
}

.filter-intensity{

    display:flex;

    justify-content:space-between;

    color:white;

    font-size:13px;

    margin-bottom:8px;
}

/* ===================================================== */
/* EDITOR                                                 */
/* ===================================================== */

.editor{

    flex:1;

    display:flex;

    flex-direction:column;

    gap:24px;

    min-height:0;
}

.topbar{

    height:92px;

    padding:14px;

    border-radius:40px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);
}

.topbar h2{

    color:white;

    font-size:28px;

    padding-left:18px;
}

/* ===================================================== */
/* LIQUID BUTTONS                                         */
/* ===================================================== */

.upload-btn,
.tool-btn{

    position:relative;

    overflow:hidden;

    background:
    rgba(255,255,255,0.05);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.14);

    box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.35),
    inset 0 -1px 1px rgba(255,255,255,0.03),
    0 10px 24px rgba(0,0,0,0.22);

    transition:
    transform .22s ease,
    box-shadow .22s ease,
    border .22s ease;
}

.upload-btn::before,
.tool-btn::before{

    content:"";

    position:absolute;

    inset:1px;

    border-radius:inherit;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.16),
        rgba(255,255,255,0.02)
    );
}

.upload-btn:hover,
.tool-btn:hover{

    transform:
    translateY(-3px)
    scale(1.03);

    box-shadow:
    0 16px 32px rgba(0,0,0,0.3);

    border:
    1px solid rgba(255,255,255,0.24);
}

.upload-btn:active,
.tool-btn:active{

    transform:
    scale(0.92);
}

/* ===================================================== */
/* UPLOAD                                                 */
/* ===================================================== */

.upload-btn{

    width:280px;

    height:62px;

    border-radius:999px;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    color:white;

    font-weight:600;
}

/* ===================================================== */
/* WORKSPACE                                              */
/* ===================================================== */

.workspace{

    flex:1;

    display:flex;

    gap:24px;

    min-height:0;
}

/* ===================================================== */
/* PHOTO BOX                                              */
/* ===================================================== */

/* ================= CANVAS FIX ================= */


/* ================= CANVAS FIX ================= */

/* FIX UTAMA CROP CURSOR */
canvas{
    border-radius:22px;
    cursor:default;
}

/* saat crop aktif */
canvas.crop-mode{
    cursor:crosshair !important;
}

/* ================= TOOL BUTTON ================= */

.tool-btn{
    width:68px;
    height:68px;
    border-radius:50%;
    border:none;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ================= FILTER PREVIEW FIX ================= */

.filter-preview canvas{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
    cursor:default; /* FIX pointer tidak berubah */
}

/* ================= CROP WARNING ================= */

.crop-warning{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    display:none;
    padding:14px 22px;
    border-radius:999px;
    color:white;
    background:rgba(16,185,129,0.18);
    backdrop-filter:blur(25px);
    border:1px solid rgba(16,185,129,0.35);
    z-index:99;
}


.photo-box{

    flex:1;

    position:relative;

    overflow:hidden;

    border-radius:40px;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);
}

canvas{

    border-radius:22px;

    cursor:crosshair;

    max-width:100%;
    max-height:100%;
}

/* ===================================================== */
/* TOOLS                                                  */
/* ===================================================== */

.tools-box{

    width:130px;

    padding:20px;

    border-radius:40px;

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:18px;

    overflow-y:auto;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);
}

.tools-box::-webkit-scrollbar{
    width:0;
}

.tools-title{

    color:white;

    font-size:22px;

    font-weight:700;

    margin-bottom:4px;
}

.tool-btn{

    width:68px;
    height:68px;

    border:none;

    border-radius:50%;

    cursor:pointer;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-shrink:0;
}

.tool-btn.active{

    background:
    linear-gradient(
        180deg,
        rgba(16,185,129,0.28),
        rgba(16,185,129,0.08)
    );

    box-shadow:
    0 0 22px rgba(16,185,129,0.4);
}

.tool-icon{

    width:28px;
    height:28px;

    z-index:2;

    filter:
    brightness(0)
    invert(1);

    transition:
    transform .25s ease;
}

.tool-btn:hover .tool-icon{

    transform:
    scale(1.1)
    rotate(-5deg);
}

/* ===================================================== */
/* CROP WARNING                                           */
/* ===================================================== */

.crop-warning{

    position:absolute;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    display:none;

    padding:14px 22px;

    border-radius:999px;

    color:white;

    background:
    rgba(16,185,129,0.18);

    backdrop-filter:
    blur(25px);

    border:
    1px solid rgba(16,185,129,0.35);

    z-index:99;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h1>Photo Editor</h1>

<div class="subtitle">
Liquid Glass Interface
</div>

<div class="group">

<h2>Adjustments</h2>

<div class="slider-box">

<label>
Brightness
<span id="brightnessValue">0%</span>
</label>

<input
type="range"
id="brightness"
min="-100"
max="100"
value="0">

</div>

<div class="slider-box">

<label>
Contrast
<span id="contrastValue">0%</span>
</label>

<input
type="range"
id="contrast"
min="-100"
max="100"
value="0">

</div>

<div class="slider-box">

<label>
Saturation
<span id="saturationValue">0%</span>
</label>

<input
type="range"
id="saturation"
min="-100"
max="100"
value="0">

</div>

<div class="slider-box">

<label>
Noise
<span id="noiseValue">0%</span>
</label>

<input
type="range"
id="noise"
min="-100"
max="100"
value="0">

</div>

<div class="slider-box">

<label>
Shadow
<span id="shadowValue">0%</span>
</label>

<input
type="range"
id="shadow"
min="-100"
max="100"
value="0">

</div>

</div>

<div class="group">

<h2>Filters</h2>

<div class="filter-grid" id="filterGrid"></div>

</div>

</div>

<div class="editor">

<div class="topbar">

<h2>PROJECT PCD✨</h2>

<label class="upload-btn">

Upload Photo

<input
type="file"
id="upload"
accept="image/*"
hidden>

</label>

</div>

<div class="workspace">

<div
class="photo-box"
id="canvasContainer">

<div
class="crop-warning"
id="cropWarning">

✂ Crop Mode Aktif

</div>

<canvas id="canvas"></canvas>

</div>

<div class="tools-box">

<div class="tools-title">
Tools
</div>

<button
class="tool-btn"
id="cropBtn"
onclick="activateCrop(this)">

<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/crop.png"
class="tool-icon">

</button>

<div id="rotateToolWrap" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;">
<button
class="tool-btn"
id="rotateToggleBtn"
onclick="toggleRotateTool(this)">
<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/rotate-right.png"
class="tool-icon">
</button>
<div id="rotateSliderWrap" style="display:none;width:100%;padding:0 4px;">
<input type="range" id="rotationSlider" min="-180" max="180" value="0"
style="width:100%;writing-mode:vertical-lr;direction:rtl;height:110px;appearance:slider-vertical;-webkit-appearance:slider-vertical;"
oninput="onRotationSlider(this.value)">
<div style="color:rgba(255,255,255,0.7);font-size:11px;text-align:center;margin-top:4px;" id="rotationDeg">0°</div>
</div>
</div>

<button
class="tool-btn"
onclick="activateTool(this); flipImage();">

<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/flip-horizontal.png"
class="tool-icon">

</button>

<button
class="tool-btn"
onclick="activateTool(this); zoomIn();">

<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/zoom-in.png"
class="tool-icon">

</button>

<button
class="tool-btn"
onclick="activateTool(this); zoomOut();">

<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/zoom-out.png"
class="tool-icon">

</button>

<button
class="tool-btn"
onclick="activateTool(this); resetImage();">

<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/restart.png"
class="tool-icon">

</button>

<button
class="tool-btn"
onclick="activateTool(this); downloadImage();">

<img
src="https://img.icons8.com/ios-filled/100/FFFFFF/download--v1.png"
class="tool-icon">

</button>

</div>

</div>

</div>

</div>

<script>

/* ===================================================== */
/* ELEMENTS                                               */
/* ===================================================== */

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const upload =
document.getElementById("upload");

const cropWarning =
document.getElementById("cropWarning");

const canvasContainer =
document.getElementById("canvasContainer");

/* ===================================================== */
/* ADJUSTMENTS                                            */
/* ===================================================== */

const brightnessSlider =
document.getElementById("brightness");

const contrastSlider =
document.getElementById("contrast");

const saturationSlider =
document.getElementById("saturation");

const brightnessValue =
document.getElementById("brightnessValue");

const contrastValue =
document.getElementById("contrastValue");

const saturationValue =
document.getElementById("saturationValue");

const noiseSlider =
document.getElementById("noise");

const noiseValue =
document.getElementById("noiseValue");

const shadowSlider =
document.getElementById("shadow");

const shadowValue =
document.getElementById("shadowValue");

/* ===================================================== */
/* IMAGE STATE                                            */
/* ===================================================== */

let img = new Image();

let originalImage = "";

let firstUploadedImage = "";

let scale = 1;

let rotation = 0;

let flip = 1;

let cropMode = false;

/* ===================================================== */
/* CROP STATE                                             */
/* ===================================================== */

let isDragging = false;

let cropStartX = 0;
let cropStartY = 0;

let cropEndX = 0;
let cropEndY = 0;

/* ===================================================== */
/* FILTERS                                                */
/* ===================================================== */

const filterList = [

{key:"grayscale",name:"Grayscale"},
{key:"blur",name:"Blur"},
{key:"sepia",name:"Sepia"},
{key:"invert",name:"Invert"},
{key:"contrast",name:"Contrast"},
{key:"bright",name:"Bright"},
{key:"cool",name:"Cool"},
{key:"warm",name:"Warm"},
{key:"vintage",name:"Vintage"},
{key:"fade",name:"Fade"}

];

let filters = {};

filterList.forEach(f=>{

filters[f.key] = {

active:false,
intensity:0

};

});

/* ===================================================== */
/* ADJUSTMENTS VALUE                                      */
/* ===================================================== */

let adjustments = {

brightness:100,
contrast:100,
saturation:100,
noise:0,
shadow:0

};

/* ===================================================== */
/* CREATE FILTER UI                                       */
/* ===================================================== */

const filterGrid =
document.getElementById("filterGrid");

filterList.forEach(filter=>{

filterGrid.innerHTML += `

<div
class="filter-card"
onclick="toggleFilter('${filter.key}',this,event)">

<div class="filter-preview">

<canvas
id="preview-${filter.key}"
width="120"
height="120"></canvas>

</div>

<div class="filter-name">
${filter.name}
</div>

<div
class="filter-slider"
id="slider-${filter.key}">

<div class="filter-intensity">

<span>Intensity</span>

<span
id="value-${filter.key}">
0%
</span>

</div>

<input
type="range"
min="0"
max="100"
value="0"
onclick="event.stopPropagation()"
oninput="
updateFilter(
'${filter.key}',
this.value
)">

</div>

</div>
`;

});

/* ===================================================== */
/* UPLOAD IMAGE                                           */
/* ===================================================== */

upload.addEventListener("change",(e)=>{

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

img.onload = ()=>{

resizeCanvas();

drawImage();

generateFilterPreviews();

};

img.src =
event.target.result;

originalImage =
event.target.result;

firstUploadedImage =
event.target.result;

};

reader.readAsDataURL(file);

});

/* ===================================================== */
/* RESIZE CANVAS                                          */
/* ===================================================== */

function resizeCanvas(){

canvas.width =
canvasContainer.clientWidth - 40;

canvas.height =
canvasContainer.clientHeight - 40;

}

/* ===================================================== */
/* FILTER STRING                                          */
/* ===================================================== */

function getFilterString(){

let filterString = `
brightness(${adjustments.brightness}%)
contrast(${adjustments.contrast}%)
saturate(${adjustments.saturation}%)
`;

if(filters.grayscale.active){

filterString +=
` grayscale(${filters.grayscale.intensity}%)`;

}

if(filters.blur.active){

filterString +=
` blur(${filters.blur.intensity / 10}px)`;

}

if(filters.sepia.active){

filterString +=
` sepia(${filters.sepia.intensity}%)`;

}

if(filters.invert.active){

filterString +=
` invert(${filters.invert.intensity}%)`;

}

if(filters.contrast.active){

filterString +=
` contrast(${100 + filters.contrast.intensity}%)`;

}

if(filters.bright.active){

filterString +=
` brightness(${100 + filters.bright.intensity}%)`;

}

if(filters.cool.active){

filterString +=
` hue-rotate(${filters.cool.intensity * 2}deg)`;

}

if(filters.warm.active){

filterString +=
`
sepia(${filters.warm.intensity * 0.6}%)
saturate(${100 + filters.warm.intensity}%)
hue-rotate(-${filters.warm.intensity / 3}deg)
`;

}

if(filters.vintage.active){

filterString +=
`
sepia(${filters.vintage.intensity * 0.7}%)
contrast(${100 + filters.vintage.intensity / 2}%)
brightness(${100 - filters.vintage.intensity / 5}%)
`;

}

if(filters.fade.active){

const fadeValue =
100 - (filters.fade.intensity / 2);

filterString +=
`
contrast(${fadeValue}%)
saturate(${fadeValue}%)
brightness(${100 + filters.fade.intensity / 8}%)
`;

}

return filterString;

}

/* ===================================================== */
/* DRAW IMAGE                                             */
/* ===================================================== */

function drawImage(){

if(!img.src) return;

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.filter =
getFilterString();

const imageAspect =
img.width / img.height;

const canvasAspect =
canvas.width / canvas.height;

let renderWidth;
let renderHeight;

if(imageAspect > canvasAspect){

renderWidth =
canvas.width * scale;

renderHeight =
renderWidth / imageAspect;

}
else{

renderHeight =
canvas.height * scale;

renderWidth =
renderHeight * imageAspect;

}

ctx.save();

ctx.translate(
canvas.width / 2,
canvas.height / 2
);

ctx.scale(flip,1);

ctx.rotate(
rotation * Math.PI / 180
);

ctx.drawImage(
img,
-renderWidth/2,
-renderHeight/2,
renderWidth,
renderHeight
);

ctx.restore();

/* ---- SHADOW OVERLAY ---- */
if(adjustments.shadow > 0){

const shadowAlpha = adjustments.shadow / 200;

const grad = ctx.createRadialGradient(
canvas.width/2, canvas.height/2, canvas.width * 0.2,
canvas.width/2, canvas.height/2, canvas.width * 0.85
);

grad.addColorStop(0, "rgba(0,0,0,0)");
grad.addColorStop(1, `rgba(0,0,0,${shadowAlpha * 2})`);

ctx.save();
ctx.globalCompositeOperation = "multiply";
ctx.fillStyle = grad;
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.restore();

}

/* ---- NOISE OVERLAY ---- */
if(adjustments.noise > 0){

const imageData =
ctx.getImageData(0, 0, canvas.width, canvas.height);

const data = imageData.data;

const noiseAmt = adjustments.noise * 1.5;

for(let i = 0; i < data.length; i += 4){

const rand = (Math.random() - 0.5) * noiseAmt;

data[i]   = Math.max(0, Math.min(255, data[i]   + rand));
data[i+1] = Math.max(0, Math.min(255, data[i+1] + rand));
data[i+2] = Math.max(0, Math.min(255, data[i+2] + rand));

}

ctx.putImageData(imageData, 0, 0);

}

if(cropMode && isDragging){

const x =
Math.min(cropStartX,cropEndX);

const y =
Math.min(cropStartY,cropEndY);

const width =
Math.abs(cropEndX - cropStartX);

const height =
Math.abs(cropEndY - cropStartY);

ctx.strokeStyle =
"#10b981";

ctx.lineWidth = 3;

ctx.setLineDash([8]);

ctx.strokeRect(
x,
y,
width,
height
);

}

}

/* ===================================================== */
/* FILTER PREVIEW                                         */
/* ===================================================== */

function generateFilterPreviews(){

if(!img.src) return;

filterList.forEach(filter=>{

const preview =
document.getElementById(
`preview-${filter.key}`);

const pctx =
preview.getContext("2d");

pctx.clearRect(
0,
0,
preview.width,
preview.height
);

let previewFilter =
"none";

switch(filter.key){

case "grayscale":
previewFilter =
"grayscale(100%)";
break;

case "blur":
previewFilter =
"blur(2px)";
break;

case "sepia":
previewFilter =
"sepia(100%)";
break;

case "invert":
previewFilter =
"invert(100%)";
break;

case "contrast":
previewFilter =
"contrast(180%)";
break;

case "bright":
previewFilter =
"brightness(160%)";
break;

case "cool":
previewFilter =
"hue-rotate(180deg)";
break;

case "warm":
previewFilter =
"sepia(60%) saturate(140%)";
break;

case "vintage":
previewFilter =
"sepia(40%) contrast(120%)";
break;

case "fade":
previewFilter =
"opacity(70%)";
break;

}

pctx.filter =
previewFilter;

pctx.drawImage(
img,
0,
0,
preview.width,
preview.height
);

});

}

/* ===================================================== */
/* ADJUSTMENTS                                            */
/* ===================================================== */

brightnessSlider.addEventListener("input",()=>{

adjustments.brightness =
Number(brightnessSlider.value) + 100;

brightnessValue.innerText =
brightnessSlider.value + "%";

drawImage();

});

contrastSlider.addEventListener("input",()=>{

adjustments.contrast =
Number(contrastSlider.value) + 100;

contrastValue.innerText =
contrastSlider.value + "%";

drawImage();

});

saturationSlider.addEventListener("input",()=>{

adjustments.saturation =
Number(saturationSlider.value) + 100;

saturationValue.innerText =
saturationSlider.value + "%";

drawImage();

});

noiseSlider.addEventListener("input",()=>{

adjustments.noise =
Number(noiseSlider.value);

noiseValue.innerText =
noiseSlider.value + "%";

drawImage();

});

shadowSlider.addEventListener("input",()=>{

adjustments.shadow =
Number(shadowSlider.value);

shadowValue.innerText =
shadowSlider.value + "%";

drawImage();

});

/* ===================================================== */
/* FILTER TOGGLE                                          */
/* ===================================================== */

function toggleFilter(name,card,event){

if(event.target.closest(".filter-slider")) return;

filters[name].active =
!filters[name].active;

const slider =
document.getElementById(
`slider-${name}`);

if(filters[name].active){

card.classList.add("active");

slider.classList.add("active");

}
else{

card.classList.remove("active");

slider.classList.remove("active");

filters[name].intensity = 0;

slider.querySelector("input").value = 0;

document.getElementById(
`value-${name}`).innerText =
"0%";

}

drawImage();

}

function updateFilter(name,value){

filters[name].intensity =
Number(value);

document.getElementById(
`value-${name}`).innerText =
value + "%";

drawImage();

}

/* ===================================================== */
/* TOOLS                                                  */
/* ===================================================== */

function activateTool(button){

if(button.classList.contains("active")){

button.classList.remove("active");

return;

}

document
.querySelectorAll(".tool-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

}

/* ===================================================== */
/* ROTATE SLIDER TOOL                                    */
/* ===================================================== */

function toggleRotateTool(button){

const wrap =
document.getElementById("rotateSliderWrap");

if(wrap.style.display === "none"){

wrap.style.display = "flex";
wrap.style.flexDirection = "column";
wrap.style.alignItems = "center";

button.classList.add("active");

}else{

wrap.style.display = "none";

button.classList.remove("active");

}

}

function onRotationSlider(val){

rotation = Number(val);

document.getElementById("rotationDeg").innerText = val + "°";

drawImage();

}

/* ===================================================== */
/* ROTATE (legacy kept for compat)                       */
/* ===================================================== */

function rotateImage(){

rotation += 90;

const slider = document.getElementById("rotationSlider");
if(slider){
slider.value = ((rotation % 360) + 360) % 360 > 180
? (((rotation % 360) + 360) % 360) - 360
: ((rotation % 360) + 360) % 360;
document.getElementById("rotationDeg").innerText = slider.value + "°";
}

drawImage();

}

/* ===================================================== */
/* FLIP                                                   */
/* ===================================================== */

function flipImage(){

flip *= -1;

drawImage();

}

/* ===================================================== */
/* ZOOM                                                   */
/* ===================================================== */

function zoomIn(){

scale += 0.1;

drawImage();

}

function zoomOut(){

scale -= 0.1;

if(scale < 0.2){

scale = 0.2;

}

drawImage();

}

/* ===================================================== */
/* RESET                                                  */
/* ===================================================== */

function resetImage(){

if(!firstUploadedImage) return;

scale = 1;

rotation = 0;

flip = 1;

cropMode = false;

isDragging = false;

adjustments = {

brightness:100,
contrast:100,
saturation:100,
noise:0,
shadow:0

};

brightnessSlider.value = 0;
contrastSlider.value = 0;
saturationSlider.value = 0;
noiseSlider.value = 0;
shadowSlider.value = 0;

brightnessValue.innerText = "0%";
contrastValue.innerText = "0%";
saturationValue.innerText = "0%";
noiseValue.innerText = "0%";
shadowValue.innerText = "0%";

const rotSlider = document.getElementById("rotationSlider");
if(rotSlider){ rotSlider.value = 0; }
const rotDeg = document.getElementById("rotationDeg");
if(rotDeg){ rotDeg.innerText = "0°"; }

filterList.forEach(f=>{

filters[f.key].active = false;

filters[f.key].intensity = 0;

const sliderBox =
document.getElementById(
`slider-${f.key}`);

const sliderInput =
sliderBox.querySelector("input");

sliderBox.classList.remove("active");

sliderInput.value = 0;

document.getElementById(
`value-${f.key}`).innerText =
"0%";

});

document
.querySelectorAll(".filter-card")
.forEach(card=>{

card.classList.remove("active");

});

document
.querySelectorAll(".tool-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

const resetImg =
new Image();

resetImg.onload = ()=>{

img = resetImg;

originalImage =
firstUploadedImage;

drawImage();

generateFilterPreviews();

};

resetImg.src =
firstUploadedImage;

}

/* ===================================================== */
/* DOWNLOAD                                               */
/* ===================================================== */

function downloadImage(){

const link =
document.createElement("a");

link.download =
"edited-image.png";

link.href =
canvas.toDataURL();

link.click();

}

/* ===================================================== */
/* CROP MODE                                              */
/* ===================================================== */

function activateCrop(button){

cropMode = !cropMode;

if(cropMode){

activateTool(button);

cropWarning.style.display =
"block";

setTimeout(()=>{

cropWarning.style.display =
"none";

},3000);

}
else{

button.classList.remove("active");

}

}

/* ===================================================== */
/* CROP SELECT                                            */
/* ===================================================== */

canvas.addEventListener("mousedown",(e)=>{

if(!cropMode) return;

isDragging = true;

const rect =
canvas.getBoundingClientRect();

cropStartX =
e.clientX - rect.left;

cropStartY =
e.clientY - rect.top;

cropEndX = cropStartX;
cropEndY = cropStartY;

});

canvas.addEventListener("mousemove",(e)=>{

if(!cropMode || !isDragging) return;

const rect =
canvas.getBoundingClientRect();

cropEndX =
e.clientX - rect.left;

cropEndY =
e.clientY - rect.top;

drawImage();

});

canvas.addEventListener("mouseup",()=>{

if(!cropMode || !isDragging) return;

isDragging = false;

applyCrop();

});

/* ===================================================== */
/* APPLY CROP                                             */
/* ===================================================== */

function applyCrop(){

const x =
Math.min(cropStartX,cropEndX);

const y =
Math.min(cropStartY,cropEndY);

const width =
Math.abs(cropEndX - cropStartX);

const height =
Math.abs(cropEndY - cropStartY);

if(width < 20 || height < 20){

drawImage();
return;

}

const tempCanvas =
document.createElement("canvas");

const tempCtx =
tempCanvas.getContext("2d");

tempCanvas.width = width;
tempCanvas.height = height;

tempCtx.drawImage(
canvas,
x,
y,
width,
height,
0,
0,
width,
height
);

const cropped =
tempCanvas.toDataURL();

img.onload = ()=>{

drawImage();

generateFilterPreviews();

};

img.src = cropped;

originalImage = cropped;

cropMode = false;

document
.querySelectorAll(".tool-btn")
.forEach(btn=>{

btn.classList.remove("active");

});

}

/* ===================================================== */
/* RESIZE                                                 */
/* ===================================================== */

window.addEventListener(
"resize",
()=>{

resizeCanvas();

drawImage();

});

/* ===================================================== */
/* INIT                                                   */
/* ===================================================== */

resizeCanvas();

</script>

</body>
